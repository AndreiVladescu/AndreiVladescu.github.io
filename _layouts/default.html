<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="{{ page.title | default: site.author }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {{ site.author }}{% else %}{{ site.author }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text x='50' y='68' font-family='monospace' font-size='48' font-weight='bold' fill='%23cc2222' text-anchor='middle'>0x</text></svg>">
  <script>
    /* no-FOUC: apply theme before first paint */
    (function(){
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

<!-- Mobile topbar -->
<div class="topbar">
  <button class="hamburger" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <span class="topbar-title">{{ site.author }}</span>
  <button class="theme-toggle" aria-label="Toggle theme">[ light mode ]</button>
</div>

<div class="sidebar-overlay"></div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>{{ site.author }}</h1>
    <p class="tagline">{{ site.description }}</p>
  </div>

  <nav class="sidebar-nav">
    {% if page.sidebar_links %}
      <div class="nav-section">
        <div class="nav-label">On this page</div>
        {% for link in page.sidebar_links %}
          <a href="#{{ link.id }}">{{ link.label }}</a>
        {% endfor %}
      </div>
    {% endif %}

    <div class="nav-section">
      <div class="nav-label">Links</div>
      <a href="{{ '/' | relative_url }}">← Home</a>
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <a href="mailto:{{ site.email }}">{{ site.email }}</a>
    <button class="theme-toggle" aria-label="Toggle theme">[ light mode ]</button>
  </div>
</aside>

<!-- Content -->
<div class="main-wrap">
  <main>
    {{ content }}
  </main>
  <footer>
    <a href="mailto:{{ site.email }}">{{ site.email }}</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/{{ site.github_username }}">github.com/{{ site.github_username }}</a>
  </footer>
</div>

<script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
